name: Flutter Multi Platform CI

on:
  push:
    branches: ["main", "master"]
    tags: ["v*"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  analyze_and_test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.7
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Dart analyze
        run: dart analyze

      - name: Flutter test
        run: flutter test

  create_auto_tag:
    name: Create Auto Tag
    runs-on: ubuntu-latest
    needs: analyze_and_test
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/')
    permissions:
      contents: write
    outputs:
      tag_name: ${{ steps.tag.outputs.tag_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Create timestamp tag
        id: tag
        run: |
          TAG_NAME="v0.0.3-$(date -u +'%Y%m%d-%H%M%S')"
          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${TAG_NAME}" "$GITHUB_SHA"
          git push origin "${TAG_NAME}"

  build_windows:
    name: Build Windows
    runs-on: windows-latest
    needs: [analyze_and_test, create_auto_tag]
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') || needs.create_auto_tag.outputs.tag_name != ''
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.7
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Archive Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: build/windows/x64/runner/Release/

  build_linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: [analyze_and_test, create_auto_tag]
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') || needs.create_auto_tag.outputs.tag_name != ''
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.7
          channel: stable
          cache: true

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Linux release
        run: flutter build linux --release

      - name: Archive Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: build/linux/x64/release/bundle/

  build_macos:
    name: Build macOS
    runs-on: macos-latest
    needs: [analyze_and_test, create_auto_tag]
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') || needs.create_auto_tag.outputs.tag_name != ''
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.7
          channel: stable
          cache: true

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Flutter pub get
        run: flutter pub get

      - name: Build macOS release
        run: flutter build macos --release

      - name: Archive macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: build/macos/Build/Products/Release/

  build_android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: [analyze_and_test, create_auto_tag]
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') || needs.create_auto_tag.outputs.tag_name != ''
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.7
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Android debug APK
        run: flutter build apk --debug

      - name: Archive Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk

  build_web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: [analyze_and_test, create_auto_tag]
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') || needs.create_auto_tag.outputs.tag_name != ''
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.7
          channel: stable
          cache: true

      - name: Enable Web
        run: flutter config --enable-web

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Web release
        run: flutter build web --release

      - name: Archive Web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-release
          path: build/web/

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [create_auto_tag, build_windows, build_linux, build_macos, build_android, build_web]
    if: startsWith(github.ref, 'refs/tags/v') || needs.create_auto_tag.outputs.tag_name != ''
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || needs.create_auto_tag.outputs.tag_name }}
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: dist/windows-release

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-release
          path: dist/linux-release

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-release
          path: dist/macos-release

      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: android-debug-apk
          path: dist/android

      - name: Download Web artifact
        uses: actions/download-artifact@v4
        with:
          name: web-release
          path: dist/web-release

      - name: Create release archives
        run: |
          cd dist
          zip -r hmi-host-${RELEASE_TAG}-windows-x64.zip windows-release
          zip -r hmi-host-${RELEASE_TAG}-linux-x64.zip linux-release
          zip -r hmi-host-${RELEASE_TAG}-macos.zip macos-release
          zip -r hmi-host-${RELEASE_TAG}-web.zip web-release
          cp android/app-debug.apk hmi-host-${RELEASE_TAG}-android-debug.apk

      - name: Ensure tag exists
        run: |
          git init
          git remote add origin "https://github.com/${{ github.repository }}.git"
          git fetch --tags origin
          if git rev-parse "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Tag ${RELEASE_TAG} already exists"
          else
            echo "Tag ${RELEASE_TAG} missing. Creating from ${GITHUB_SHA}."
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "${RELEASE_TAG}" "${GITHUB_SHA}"
            git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" "${RELEASE_TAG}"
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            dist/hmi-host-${{ env.RELEASE_TAG }}-windows-x64.zip
            dist/hmi-host-${{ env.RELEASE_TAG }}-linux-x64.zip
            dist/hmi-host-${{ env.RELEASE_TAG }}-macos.zip
            dist/hmi-host-${{ env.RELEASE_TAG }}-web.zip
            dist/hmi-host-${{ env.RELEASE_TAG }}-android-debug.apk
          generate_release_notes: true
